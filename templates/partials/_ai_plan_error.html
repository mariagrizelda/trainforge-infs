  <i class="bi bi-exclamation-circle fs-5"></i>
  <div>
    <strong>Couldn't generate the plan.</strong>

      <a href="{% url 'plan_create' client_id=client.id %}" class="text-decoration-underline">Build it manually instead</a>.

  </div>
</div>
